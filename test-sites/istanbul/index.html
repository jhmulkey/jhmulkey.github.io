<!doctype html>
<html ontouch>
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Istanbul</title>
    <link rel="apple-touch-icon" href="images/apple-touch-icon.png"/>
    <link rel="stylesheet" type="text/css" href="main.css"/>
</head>
<body>
     
    <img id="subtract" src="images/subtract-button.png" height="50px" onclick="removeExt()"/>
    <img id="add" src="images/add-button.png" height="50px" onclick="addExt()"/>
    
    <div>
        <table>
            <tr>
                <td id="blue-0" onclick="select('blue',0)">0</td>
                <td id="blue-1" onclick="select('blue',1)"></td>
                <td id="blue-2" onclick="select('blue',2)"></td>
                <td id="blue-3" onclick="select('blue',3)" class="ext-1"></td>
                <td id="blue-4" onclick="select('blue',4)" class="ext-2"></td>
                <td id="blue-5" onclick="select('blue',5)" class="ext-3"></td>
            </tr>
            <tr>
                <td id="red-0" onclick="select('red',0)">0</td>
                <td id="red-1" onclick="select('red',1)"></td>
                <td id="red-2" onclick="select('red',2)"></td>
                <td id="red-3" onclick="select('red',3)" class="ext-1"></td>
                <td id="red-4" onclick="select('red',4)" class="ext-2"></td>
                <td id="red-5" onclick="select('red',5)" class="ext-3"></td>
            </tr>
            <tr>
                <td id="green-0" onclick="select('green',0)">0</td>
                <td id="green-1" onclick="select('green',1)"></td>
                <td id="green-2" onclick="select('green',2)"></td>
                <td id="green-3" onclick="select('green',3)" class="ext-1"></td>
                <td id="green-4" onclick="select('green',4)" class="ext-2"></td>
                <td id="green-5" onclick="select('green',5)" class="ext-3"></td>
            </tr>
            <tr>
                <td id="yellow-0" onclick="select('yellow',0)">0</td>
                <td id="yellow-1" onclick="select('yellow',1)"></td>
                <td id="yellow-2" onclick="select('yellow',2)"></td>
                <td id="yellow-3" onclick="select('yellow',3)" class="ext-1"></td>
                <td id="yellow-4" onclick="select('yellow',4)" class="ext-2"></td>
                <td id="yellow-5" onclick="select('yellow',5)" class="ext-3"></td>
            </tr>
        </table>
    </div>
    
    <div id="dice-wrapper" onclick="rollDice()">
    
        <div id="dice-1" class="dice-div"></div>
    
        <div id="dice-2" class="dice-div"></div>
        
    </div>
   
    <script src="index.js"></script>
    
</body>
</html>
