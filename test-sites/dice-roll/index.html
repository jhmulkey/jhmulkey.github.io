<!doctype html>
<html>
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Pre-Game</title>
    <link rel="stylesheet" type="text/css" href="main.css"/>
    <link rel="apple-touch-icon" href="images/apple-touch-icon.png"/>
</head>
<body>
     
    <div id="main-wrapper-div">
    <div>
        <div class="board-radio-flex-div">
            <div>
                <p class="board-p">1-9</p>
                <input id="B1-9" type="radio" name="select-board-group" checked="checked" onclick="setBoardIndex(0)"/>
            </div>
            <div>
                <p class="board-p">10a-h</p>
                <input id="B10a-h" type="radio" name="select-board-group" onclick="setBoardIndex(1)"/>
            </div>
            <div>
                <p class="board-p">13a-h</p>
                <input id="B13a-h" type="radio" name="select-board-group" onclick="setBoardIndex(2)"/>
            </div>
            <div>
                <p class="board-p">All</p>
                <input id="all-boards" type="radio" name="select-board-group" onclick="setBoardIndex(3)"/>
            </div>
        </div>
    </div>
       
    <div id="board-select-div" onclick="chooseBoards(_boardsIndex)">tap to choose board</div>  
    
    <div id="roll-white-dice-div" onclick="rollWhiteDice()">tap to roll white dice</div>
    
    <div id="link-button-div">
        <a href="play.html" target="_blank">
            <div class="button-3b">Play</div>
        </a>
        <br/>
        <a href="setup.html" target="_blank">
            <div class="button-3">Setup Guide</div>
        </a>
        <br/>
        <a href="expansion.html" target="_blank">
            <div class="button-3">Expansion Rules</div>
        </a>
        <br/>
        <a href="reference.html" target="_blank">
            <div class="button-3">Reference</div>
        </a>
    </div>
    </div>
    <script src="scripts/index.js"></script>
</body>
</html>
