<!doctype html>
<html>
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Pre-Game</title>
    <link rel="stylesheet" type="text/css" href="main.css"/>
    <link rel="apple-touch-icon" href="images/apple-touch-icon.png"/>
</head>
<body>
     
    <div id="title-screen">
        <p>Castles of Burgundy</p>
        <img src="images/title-photo.jpg" width="75%"/>
    </div>
    
    <div id="select-board-group-pop">
        <p>Select Board Group</p>
        <div id="select-players-flex-div">
            <div class="board-button" onclick="setBoardIndex(0)">Boards 1-9</div>
            <div class="board-button" onclick="setBoardIndex(1)">Boards 10a-h</div>
            <div class="board-button" onclick="setBoardIndex(2)">Boards 13a-h</div>
            <div class="board-button" onclick="setBoardIndex(3)">All Boards</div>
            <a href="play.html">
                <div class="board-button2">Skip</div>
            </a>
        </div>
    </div> 
    
    <div id="select-board-pop" onclick="chooseBoards(_boardsIndex)">
        <p>Tap Screen to Select Random Board</p>
        <div id="tap-to-select"></div>
        <div class="button-3b" onclick="whiteDicePop()">Continue</div>
    </div> 
    
    <div id="white-dice-pop" onclick="rollWhiteDice()">
        <p>Tap Screen to Roll White Dice</p>
        <div id="tap-to-roll"></div>
        <a href="play.html">
            <div class="button-3b">Continue</div>
        </a>
    </div>
