<!doctype html>
<html>
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Green Dice</title>
    <link rel="stylesheet" type="text/css" href="main.css"/>
</head>
<body>
         
    <div class="roll-button-flex-div">
        <div class="checkbox-div">
            <p class="check-here-p">1st</p>
            <input type="checkbox" onclick="whiteDiceVisible()"/>
        </div>
        <div class="button-div">
            <img src="images/roll-button.png" onclick="rollDice('green')"/>
        </div>
        <div class="checkbox-div">
            <p class="check-here-p">Bonus</p>
            <input id="bonus-checkbox" type="checkbox"/>
        </div>
    </div>
    
    <div class="rolled-dice-flex-div">
        <div class="click-to-hide-div" onclick="hide1()">
            <div id="roll-1-div" style="visibility: visible"></div>
        </div>
        <div id="roll-3-div" style="visibility: hidden"></div>
        <div class="click-to-hide-div" onclick="hide2()">
            <div id="roll-2-div"></div>
        </div>
    </div>
    
    <div class="phase-points-round-div">
        <div class="phase-round-div">
            <p>Phase</p><span id="phase-span">A</span>
        </div>
        <div class="total-points-div">
            <p class="total-points-p"><span id="total-points">0</span></p>
        </div>
        <div class="phase-round-div">
            <p>Round</p><span id="round-span">1</span>
        </div>
    </div>
    
    <div class="centered-div">
        <p class="player-p">Number of Players: <span id="player-span"></span></p>
    </div>
    
    <div class="region-point-tap">
        <div onclick="regionPoints(1)">1</div>
        <div onclick="regionPoints(2)">2</div>
        <div onclick="regionPoints(3)">3</div>
        <div onclick="regionPoints(4)">4</div>
        <div onclick="regionPoints(5)">5</div>
        <div onclick="regionPoints(6)">6</div>
        <div onclick="regionPoints(7)">7</div>
        <div onclick="regionPoints(8)">8</div>
    </div>

    <div class="point-quickadd-div">
        <div id="quickadd1" class="button-2" onclick="sellGoods()"></div>
        <div id="quickadd2" class="button-2" onclick="tapPoints(4)"></div>
        <div id="quickadd3" class="button-2" onclick="addPoints()"></div>
        <div id="quickadd4" class="button-2" onclick="bonusTile('L')"></div>
        <div id="quickadd5" class="button-2" onclick="bonusTile('S')"></div>
    </div>
            
    <div class="point-quickadd-div">
        <div id="quickadd6" class="button-2" onclick="unsoldGoods()"></div>
        <div id="quickadd7" class="button-2" onclick="remSilver()"></div>
        <div id="quickadd8" class="button-2" onclick="remWorker()"></div>
        <div id="quickadd9" class="button-2" onclick="know15()"></div>
        <div id="quickadd10" class="button-2" onclick="know1623()"></div>
        <div id="quickadd11" class="button-2" onclick="know24()"></div>
        <div id="quickadd12" class="button-2" onclick="know25()"></div>
        <div id="quickadd13" class="button-2" onclick="know26()"></div>
    </div>
        
    <div class="point-control-div">
        <div class="button-1" onclick="setPoints()">Set</div>
        <div class="button-1" onclick="resetPoints()">Reset</div>
        <div class="button-1" onclick="adjustPoints()">Adjust</div>
    </div>
            
    <div class="knowledge-tile-flex-div">
        <img src="images/knowledge-tiles-1.png" height="150px" onclick="knowledgeTile(1)"/>
        
        <img src="images/knowledge-tiles-2.png" height="150px" onclick="knowledgeTile(2)"/>

        <img src="images/knowledge-tiles-3.png" height="150px" onclick="knowledgeTile(3)"/>

        <img src="images/knowledge-tiles-4.png" height="150px" onclick="knowledgeTile(4)"/>

        <img src="images/knowledge-tiles-5.png" height="150px" onclick="knowledgeTile(5)"/>

        <img src="images/knowledge-tiles-6.png" height="150px" onclick="knowledgeTile(6)"/>

        <img src="images/knowledge-tiles-7.png" height="150px" onclick="knowledgeTile(7)"/>

        <img src="images/knowledge-tiles-8.png" height="150px" onclick="knowledgeTile(8)"/>

        <img src="images/knowledge-tiles-9.png" height="150px" onclick="knowledgeTile(9)"/>

        <img src="images/knowledge-tiles-10.png" height="150px" onclick="knowledgeTile(10)"/>

        <img src="images/knowledge-tiles-11.png" height="150px" onclick="knowledgeTile(11)"/>

        <img src="images/knowledge-tiles-12.png" height="150px" onclick="knowledgeTile(12)"/>

        <img src="images/knowledge-tiles-13.png" height="150px" onclick="knowledgeTile(13)"/>

        <img src="images/knowledge-tiles-14.png" height="150px" onclick="knowledgeTile(14)"/>

        <img src="images/knowledge-tiles-15.png" height="150px" onclick="knowledgeTile(15)"/>

        <img src="images/knowledge-tiles-16-23.png" height="150px" onclick="knowledgeTile(16)"/>

        <img src="images/knowledge-tiles-24.png" height="150px" onclick="knowledgeTile(17)"/>

        <img src="images/knowledge-tiles-25.png" height="150px" onclick="knowledgeTile(18)"/>

        <img src="images/knowledge-tiles-26.png" height="150px" onclick="knowledgeTile(19)"/>
    </div>
    
    <script src="dice-roll.js"></script>
    
</body>
</html>
