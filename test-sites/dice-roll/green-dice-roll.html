<!doctype html>
<html>
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Green Dice</title>
    <link rel="stylesheet" type="text/css" href="main.css"/>
</head>
<body>
     
    <div class="dice-roll-title-div">
        <p>Roll Green Dice</p><br/>
    </div>
    <div class="dice-roll-button-div">
        <div class="checkbox-div">
            <p class="check-here-p">Check here if<br/>first player</p>
            <input type="checkbox" onclick="whiteDiceVisible()"/>
        </div>
        <div class="button-div">
            <a onclick="rollGreenDice()">
            <img id="roll-button" src="images/roll-button.png"/>
            </a>    
        </div>
        <div class="white-dice-div">
            <div id="roll-3-div" style="visibility: hidden"></div>
        </div>
    </div>
    
    <div id="dice-div">
        <div onclick="hide1()">
            <div id="roll-1-div" style="visibility: visible"></div>
        </div>
        <div onclick="hide2()">
            <div id="roll-2-div" style="visibility: visible"></div>
        </div>
    </div>
    
    <div id="reference-link-div">
        <a href="reference.html" target="_blank">
            <p>* Reference *</p>
        </a>
    </div>
    
    <script src="main.js"></script>
</body>
</html>
