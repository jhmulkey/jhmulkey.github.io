<!doctype html>
<html>
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Play</title>
    <link rel="stylesheet" type="text/css" href="main.css"/>
</head>
<body>
         
    <div id="select-players-pop">
        <p>How many players?</p>
        <div id="select-players-flex-div">
            <div class="select-button" onclick="setPlayers(2)">2</div>
            <div class="select-button" onclick="setPlayers(3)">3</div>
            <div class="select-button" onclick="setPlayers(4)">4</div>
        </div>
    </div>    
        
    <div id="select-color-pop">
        <p>Select Color</p>
        <div id="select-color-flex-div">
            <img src="images/black-dice-1.png" width="100px" height="100px" onclick="setColor(1)"/>
            <img src="images/red-dice-1.png" width="100px" height="100px" onclick="setColor(2)"/>
            <img src="images/green-dice-1.png" width="100px" height="100px" onclick="setColor(3)"/>
            <img src="images/blue-dice-1.png" width="100px" height="100px" onclick="setColor(4)"/>
        </div>
    </div> 
    
    <div id="main-wrapper-div">
        
    <div class="roll-button-flex-div">
        <div class="checkbox-div">
            <p class="check-here-p">1st</p>
            <input type="checkbox" onclick="hide(3)"/>
        </div>
        <div class="button-div">
            <img src="images/roll-button.png" onclick="rollDice(_color)"/>
        </div>
        <div class="checkbox-div">
            <p class="check-here-p">Bonus</p>
            <input id="bonus-checkbox" type="checkbox"/>
        </div>
    </div>
    
    <div class="rolled-dice-flex-div">
        <div class="click-to-hide-div" onclick="hide(1)">
            <div id="roll-1-div" style="visibility: visible"></div>
        </div>
        <div id="roll-3-div" style="visibility: hidden"></div>
        <div class="click-to-hide-div" onclick="hide(2)">
            <div id="roll-2-div"></div>
        </div>
    </div>
    
    <div class="latest-points-div">
        <span id="latest-points-span"></span>
    </div>
    
    <div class="phase-points-round-flex-div">
        <div class="phase-round-div" onclick="adjustPhase()">
            <p>Phase</p><span id="phase-span">-</span>
        </div>
        <div class="total-points-div" onclick="setOrAdjust()">
            <p class="total-points-p"><span id="total-points">0</span></p>
        </div>
        <div class="phase-round-div" onclick="adjustPhase()">
            <p>Round</p><span id="round-span">-</span>
        </div>
    </div>
    
    <div>
        <p class="player-p">Number of Players: <span id="player-span"></span></p>
    </div>
    
    <div class="region-point-tap">
        <div onclick="regionPoints(0)">1</div>
        <div onclick="regionPoints(1)">2</div>
        <div onclick="regionPoints(2)">3</div>
        <div onclick="regionPoints(3)">4</div>
        <div onclick="regionPoints(4)">5</div>
        <div onclick="regionPoints(5)">6</div>
        <div onclick="regionPoints(6)">7</div>
        <div onclick="regionPoints(7)">8</div>
    </div>
   
    <div id="goods-pop">
        <p>How many goods sold?</p>
        <div id="goods-flex-div">
            <div class="select-button2" onclick="sellGoods(1)">1</div>
            <div class="select-button2" onclick="sellGoods(2)">2</div>
            <div class="select-button2" onclick="sellGoods(3)">3</div>
            <div class="select-button2" onclick="sellGoods(4)">4</div>
            <div class="select-button2" onclick="sellGoods(5)">5</div>
            <div class="select-button2" onclick="sellGoods(6)">6</div>
            <div class="select-button2" onclick="sellGoods(7)">7</div>
            <div class="select-button2" onclick="sellGoods(8)">8</div>
            <div class="select-button2" onclick="sellGoods(9)">9</div>
            <div class="select-button2" onclick="sellGoods(10)">10</div>
        </div>
    </div>
        
    <div id="animals-pop">
        <p>How many animal points?</p>
        <div id="animals-flex-div">
            <div class="select-button2" onclick="animals(1)">1</div>
            <div class="select-button2" onclick="animals(2)">2</div>
            <div class="select-button2" onclick="animals(3)">3</div>
            <div class="select-button2" onclick="animals(4)">4</div>
            <div class="select-button2" onclick="animals(5)">5</div>
            <div class="select-button2" onclick="animals(6)">6</div>
            <div class="select-button2" onclick="animals(7)">7</div>
            <div class="select-button2" onclick="animals(8)">8</div>
            <div class="select-button2" onclick="animals(9)">9</div>
            <div class="select-button2" onclick="animals(10)">10</div>
            <div class="select-button2" onclick="animals(11)">11</div>
            <div class="select-button2" onclick="animals(12)">12</div>
            <div class="select-button2" onclick="animals(13)">13</div>
            <div class="select-button2" onclick="animals(14)">14</div>
            <div class="select-button2" onclick="animals(15)">15</div>
            <div class="select-button2" onclick="animals(16)">16</div>
            <div class="select-button2" onclick="animals(17)">17</div>
            <div class="select-button2" onclick="animals(18)">18</div>
            <div class="select-button2" onclick="animals(19)">19</div>
            <div class="select-button2" onclick="animals(20)">20</div>
        </div>
    </div>
        
    <div class="point-quickadd-div">
        <div id="sell-goods" class="button-2" onclick="goodsPop()"></div>
        <div id="animals" class="button-2" onclick="animalsPop()"></div>
        <div id="watchtower" class="button-2" onclick="tapPoints(4, 'watchtower')"></div>
        <div id="monastaries" class="button-2" onclick="tapPoints(5, 'monastaries')"></div>
        <div id="large-bonus" class="button-2" onclick="bonusTile('large')"></div>
        <div id="small-bonus" class="button-2" onclick="bonusTile('small')"></div>
    </div>
    
    <div class="point-quickadd-div">
        <div id="unsold-goods" class="button-2" onclick="endGamePts(0)"></div>
        <div id="silverlings" class="button-2" onclick="endGamePts(1)"></div>
        <div id="workers" class="button-2" onclick="endGamePts(2)"></div>
        <div id="know15" class="button-2" onclick="endGamePts(3)"></div>
        <div id="know16-23" class="button-2" onclick="endGamePts(4)"></div>
        <div id="know24" class="button-2" onclick="endGamePts(5)"></div>
        <div id="know25" class="button-2" onclick="endGamePts(6)"></div>
        <div id="know26" class="button-2" onclick="endGamePts(7)"></div>
    </div>
        
    <div class="point-control-div">
        <div class="button-4" onclick="resetGame()">Reset</div>
    </div>
           
    <div id="point-log"><span id="point-log-span" class="black-chancery-h1">Point Log</span></div>
    </div>
            
    <script src="scripts/play.js"></script>
    
</body>
</html>
