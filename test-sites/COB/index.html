<!doctype html>
<html id="index-html">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>COB</title>
    <link rel="stylesheet" type="text/css" href="main.css"/>
    <link rel="apple-touch-icon" href="images/apple-touch-icon.png"/>
</head>
<body>
     
    <div id="title-screen-pop">
        <p>Castles of Burgundy</p>
        <img src="images/title-photo.jpg" width="75%"/>
    </div>
    
    <div id="select-board-group-pop" class="pu">
        <p class="pu-p">Select Board Group</p>
        <div>
            <div class="board-button" onclick="setBoardIndex(0)">Boards 1-9</div>
            <div class="board-button" onclick="setBoardIndex(1)">Boards 10a-h</div>
            <div class="board-button" onclick="setBoardIndex(2)">Boards 13a-h</div>
            <div class="board-button" onclick="setBoardIndex(3)">All Boards</div>
            <div class="board-button-skip" onclick="whiteDicePop(true)">Skip</div>
        </div>
    </div> 
    
    <div id="select-board-pop" class="pu" onclick="chooseBoards(_boardsIndex)">
        <p class="pu-p">Tap Screen to<br/>Select Random Board</p>
        <div id="tap-to-select"></div>
        <div class="board-button-skip" onclick="whiteDicePop()">Continue</div>
    </div> 
    
    <div id="white-dice-pop" class="pu" onclick="rollWhiteDice()">
        <p class="pu-p">Tap Screen to<br/>Roll White Dice</p>
        <div id="tap-to-roll"></div>
        <a href="play.html">
            <div class="board-button-skip">Continue</div>
        </a>
    </div> 
     
    <script src="scripts/index.js"></script>
</body>
</html>
