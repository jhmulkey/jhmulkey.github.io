<!doctype html>
<html>
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Start Game</title>
    <link rel="stylesheet" type="text/css" href="main.css"/>
    <link rel="apple-touch-icon" href="images/apple-touch-icon.png"/>
</head>
<body>
     
    <div class="board-wrap-div">
        <div class="board-radio-flex-div">
            <div>
                <p class="board-p">1-9</p>
                <input id="B1-9" type="radio" name="select-boards" checked="checked"/>
            </div>
            <div>
                <p class="board-p">10a-h</p>
                <input id="B10a-h" type="radio" name="select-boards"/>
            </div>
            <div>
                <p class="board-p">13a-h</p>
                <input id="B13a-h" type="radio" name="select-boards"/>
            </div>
            <div>
                <p class="board-p">All</p>
                <input id="B1-13h" type="radio" name="select-boards"/>
            </div>
        </div>
        <div id="board-select-div" onclick="chooseBoard()">
            <p id=board-select-p></p>
        </div>
    </div>
    
    <div>
        <div id="starting-player-roll-div" onclick="rollWhiteDice()">
        </div>
    </div>
    
    <div class="choose-color-flex-div">
        <a href="black-dice-roll.html" target="_blank">
            <img src="images/black-dice-1.png" height="60px" width="60px"/>
        </a>

        <a href="red-dice-roll.html" target="_blank">
            <img src="images/red-dice-1.png" height="60px" width="60px"/>
        </a>

        <a href="green-dice-roll.html" target="_blank">
            <img src="images/green-dice-1.png" height="60px" width="60px"/>
        </a>

        <a href="blue-dice-roll.html" target="_blank">
            <img src="images/blue-dice-1.png" height="60px" width="60px"/>
        </a>
    </div>
    
    <div>
        <a href="setup.html" target="_blank">
            <div class="button-3">Setup Guide</div>
        </a>
        <br/>
        <a href="expansion.html" target="_blank">
            <div class="button-3">Expansion Rules</div>
        </a>
    </div>
    
    <script src="scripts/index.js"></script>
</body>
</html>
